# Single source of truth for per-model token limits.
#
# x-limits: ignored by LiteLLM (unknown top-level key; safe_load passes it through).
# One anchor per UNDERLYING model. Every surface model_name below references its
# anchor via `model_info: *alias`, so editing ONE anchor updates every facade of
# that underlying model at once (no drift as facades multiply over few backends).
#
# max_input_tokens = the context window LiteLLM enforces (with enable_pre_call_checks).
# max_output_tokens = gateway-exposed generation ceiling. When a provider does not
# publish an output cap, this may be an intentionally conservative owned policy
# cap; x_*_confidence/source below must say which.
# NOTE: everything under model_info is echoed verbatim by GET /model/info — keep it to
# public token/capability metadata only; never stash secrets or private data here.
#
# Provider-backed limits are reconciled from OpenRouter /api/v1/models by
# `ai-litellm model refresh-capabilities`. Locally capped values must be marked
# owned-policy and documented here; do not leave guessed numbers unlabeled.
x-limits:
  deepseek_v4_pro: &deepseek_v4_pro
    max_input_tokens: 1048576
    max_output_tokens: 384000
    supports_reasoning: true
    x_input_confidence: provider
    x_input_source: openrouter.top_provider.context_length
    x_output_confidence: provider
    x_output_source: openrouter.top_provider.max_completion_tokens
    x_reasoning_confidence: provider
    x_reasoning_source: openrouter.supported_parameters
  kimi_k26: &kimi_k26
    max_input_tokens: 262142
    max_output_tokens: 262142
    supports_reasoning: true
    x_input_confidence: provider
    x_input_source: openrouter.top_provider.context_length
    x_output_confidence: provider
    x_output_source: openrouter.top_provider.max_completion_tokens
    x_reasoning_confidence: provider
    x_reasoning_source: openrouter.supported_parameters
  glm51: &glm51
    max_input_tokens: 202752
    max_output_tokens: 131072
    supports_reasoning: true
    x_input_confidence: provider
    x_input_source: openrouter.top_provider.context_length
    x_output_confidence: owned-policy
    x_output_source: provider-omits-max-completion-tokens; conservative-local-ceiling-pending-observation
    x_reasoning_confidence: provider
    x_reasoning_source: openrouter.supported_parameters
  gemma_local: &gemma_local
    max_input_tokens: 8192
    max_output_tokens: 4096
    supports_reasoning: false
    x_input_confidence: owned-policy
    x_input_source: quality-conservative-local-policy; omlx-runtime-advertises-131072
    x_output_confidence: owned-policy
    x_output_source: quality-conservative-local-policy
    x_reasoning_confidence: owned-policy
    x_reasoning_source: local-runtime-no-reasoning-routing
  qwen36_27b_local: &qwen36_27b_local
    max_input_tokens: 131072
    max_output_tokens: 16384
    supports_reasoning: false
    x_input_confidence: owned-policy
    x_input_source: native-262144-per-model-config-json; owned-policy-local-throughput-cap
    x_output_confidence: owned-policy
    x_output_source: owned-policy-local-output-cap
    x_reasoning_confidence: owned-policy
    x_reasoning_source: local-runtime-no-reasoning-routing

model_list:
  # Raw provider-facing names (<Model>-<provider lowercase>). Useful for ad-hoc
  # direct testing; the real backend is always visible in litellm_params.model.
  # Codex deliberately does the OPPOSITE below (bundled-slug facades) because
  # Codex validates models against its own catalog -- see the 2026-06-12 log.
  - model_name: DeepSeek-V4-Pro-openrouter
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *deepseek_v4_pro

  - model_name: Kimi-K2.6-openrouter
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.6
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *kimi_k26

  - model_name: GLM-5.1-openrouter
    litellm_params:
      model: openrouter/z-ai/glm-5.1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *glm51

  # Codex-native facade names. Keep these aligned with Codex's /model UI.
  - model_name: gpt-5.5
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *deepseek_v4_pro

  - model_name: gpt-5.3-codex
    litellm_params:
      model: openrouter/z-ai/glm-5.1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *glm51

  - model_name: gpt-5.4
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.6
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *kimi_k26

  - model_name: gpt-5.2
    litellm_params:
      model: openrouter/z-ai/glm-5.1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *glm51

  - model_name: gpt-5.4-mini
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.6
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *kimi_k26

  - model_name: codex-auto-review
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *deepseek_v4_pro

  # Sample local runtime-facing route. Runtime lifecycle and machine-specific
  # discovered local routes are managed by ai-litellm metadata/sync.
  - model_name: Gemma4-12B-omlx
    litellm_params:
      model: openai/gemma4-12b
      api_base: http://127.0.0.1:8000/v1
      api_key: none
    model_info: *gemma_local

  # Claude haiku-tier local model: first-class registry entry (not a discovered
  # route) so the tier survives reinstall/discovery and is anchor-checked.
  - model_name: Qwen3.6-27B-omlx
    litellm_params:
      model: openai/Qwen3.6-27B-4bit
      api_base: http://127.0.0.1:8000/v1
      api_key: none
    model_info: *qwen36_27b_local

  # Qwen3.6 35B-A3B MoE local route — Phase 0 replication arm (dense-vs-MoE under
  # identical harness guidance). Same caps as the 27B route, hence the shared anchor.
  # Name = the canonical discovered name (full model id, incl. A3B MoE marker +
  # quant), so this promoted entry and the sync-discovered route are one and the
  # same (dedup keeps only this one). Qualified thinking-OFF: this MoE drifts
  # off-task under the heavy harness system prompt with thinking on (per-model
  # qualification — see the architecture guide). extra_body.chat_template_kwargs
  # is forwarded by LiteLLM straight to oMLX.
  - model_name: Qwen3.6-35B-A3B-4bit-omlx
    litellm_params:
      model: openai/Qwen3.6-35B-A3B-4bit
      api_base: http://127.0.0.1:8000/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
    model_info: *qwen36_27b_local

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

x-gateway-output-clamp:
  # C4: provider-facing hard clamp for raw clients and future harnesses.
  # Keep numerically aligned with harness adapterConfig.outputReservation
  # defaults so the gateway clamp never fights a well-derived harness request.
  # The hook uses route model_info.max_output_tokens as capability and this
  # policy as the reservation ceiling, preserving at least minimum_input tokens.
  enabled: true
  default: 32000
  tokenizer_headroom: 8192
  minimum_input: 32768

x-gateway-cost-guardrail:
  # F2: provider-facing per-request guardrail. This is not billing-grade spend
  # accounting; it rejects very large prompts before provider dispatch so live
  # probes cannot accidentally spend dollars without an explicit opt-out.
  enabled: true
  max_estimated_input_tokens: 200000
  max_estimated_total_tokens: 240000
  chars_per_token: 4

litellm_settings:
  # drop_params: harnesses over-advertise dialect params (thinking/betas/effort);
  # dropping beats provider 400s across N harnesses x M backends. Cost: silent
  # drops -- observe via `ai-litellm reasoning matrix` drop_risk column; per-model
  # correction is a SUPPORTED_CAPABILITIES declaration, not flipping this flag.
  drop_params: true
  callbacks: [ai_litellm_callbacks.output_clamp.proxy_handler_instance]

router_settings:
  # Enforce max_input_tokens at the gateway: oversized prompts are rejected
  # (ContextWindowExceededError), never silently truncated. This is the backstop
  # that holds regardless of what each harness believes the context window is.
  enable_pre_call_checks: true
