# Single source of truth for per-model token limits.
#
# x-limits: ignored by LiteLLM (unknown top-level key; safe_load passes it through).
# One anchor per UNDERLYING model. Every surface model_name below references its
# anchor via `model_info: *alias`, so editing ONE anchor updates every facade of
# that underlying model at once (no drift as facades multiply over few backends).
#
# max_input_tokens = the context window LiteLLM enforces (with enable_pre_call_checks).
# max_output_tokens = gateway-exposed generation ceiling. When a provider does not
# publish an output cap, this may be an intentionally conservative owned policy
# cap; x_*_confidence/source below must say which.
# NOTE: everything under model_info is echoed verbatim by GET /model/info — keep it to
# public token/capability metadata only; never stash secrets or private data here.
#
# Provider-backed limits are reconciled from OpenRouter /api/v1/models by
# `claude-litellm model refresh-capabilities`. Locally capped values must be marked
# owned-policy and documented here; do not leave guessed numbers unlabeled.
x-limits:
  kimi_k27_code: &kimi_k27_code
    max_input_tokens: 262144
    max_output_tokens: 262144
    supports_reasoning: true
    x_reasoning_efforts: []
    x_input_confidence: provider
    x_input_source: openrouter.top_provider.context_length
    x_output_confidence: provider
    x_output_source: openrouter.top_provider.max_completion_tokens
    x_reasoning_confidence: provider
    x_reasoning_source: openrouter.supported_parameters
  glm52: &glm52
    max_input_tokens: 1048576
    max_output_tokens: 32768
    supports_reasoning: true
    # OpenRouter currently advertises xhigh+high for GLM 5.2, but LiteLLM
    # 1.92's Anthropic→OpenAI adapter normalizes xhigh to high before the
    # OpenRouter request is built. Advertise only the effective wire contract.
    x_reasoning_efforts: [high]
    x_provider_reasoning_efforts: [xhigh, high]
    x_reasoning_effort_ceiling: high
    x_reasoning_transport_source: litellm-1.92-anthropic-adapter-normalizes-xhigh-max-to-high
    x_input_confidence: provider
    x_input_source: openrouter.top_provider.context_length
    x_output_confidence: provider
    x_output_source: openrouter.top_provider.max_completion_tokens
    x_reasoning_confidence: provider
    x_reasoning_source: openrouter.supported_parameters; effective effort capped by local transport
  mimo_v25: &mimo_v25
    max_input_tokens: 262144
    max_output_tokens: 16384
    supports_reasoning: true
    x_reasoning_efforts: []
    x_input_confidence: provider
    x_input_source: openrouter.top_provider.context_length
    x_output_confidence: owned-policy
    x_output_source: openrouter-unpublished; conservative ceiling within current top-provider context
    x_reasoning_confidence: provider
    x_reasoning_source: openrouter.supported_parameters
  qwen36_27b_local: &qwen36_27b_local
    max_input_tokens: 131072
    max_output_tokens: 16384
    supports_reasoning: false
    x_reasoning_efforts: []
    x_input_confidence: owned-policy
    x_input_source: native-262144-per-model-config-json; owned-policy-local-throughput-cap
    x_output_confidence: owned-policy
    x_output_source: owned-policy-local-output-cap
    x_reasoning_confidence: owned-policy
    x_reasoning_source: local-runtime-no-reasoning-routing
  gpt56_sol_chatgpt_oauth: &gpt56_sol_chatgpt_oauth
    max_input_tokens: 1050000
    max_output_tokens: 128000
    supports_reasoning: true
    # GPT-5.6 Sol supports reasoning and LiteLLM 1.92's chatgpt/* adapter
    # accepts a reasoning object, but the subscription backend is not an
    # OpenAI-supported third-party gateway contract and has not been
    # live-measured. Refuse explicit effort until login-time qualification
    # establishes the accepted values.
    x_reasoning_efforts: []
    x_input_confidence: provider
    x_input_source: developers.openai.com GPT-5.6 model guidance
    x_output_confidence: provider
    x_output_source: developers.openai.com GPT-5.6 model guidance
    x_output_enforcement: provider-natural-cap-only; chatgpt-adapter-strips-token-limit-fields
    x_reasoning_confidence: owned-policy
    x_reasoning_source: openai-docs-efforts; chatgpt-oauth-selectable-levels-not-live-validated
  grok45_xai_oauth: &grok45_xai_oauth
    max_input_tokens: 500000
    max_output_tokens: 32768
    supports_reasoning: true
    x_reasoning_efforts: [low, medium, high]
    x_input_confidence: provider
    x_input_source: docs.x.ai grok-4.5 model page
    x_output_confidence: owned-policy
    x_output_source: provider-does-not-publish-completion-cap; conservative gateway ceiling
    x_output_enforcement: gateway-request-clamp
    x_reasoning_confidence: provider
    x_reasoning_source: docs.x.ai grok-4.5 configurable reasoning

model_list:
  # Raw provider-facing names (<Model>-<provider lowercase>). The real backend
  # is always visible in litellm_params.model.
  - model_name: Kimi-K2.7-Code-openrouter
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.7-code
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *kimi_k27_code

  - model_name: Mimo-V2.5-openrouter
    litellm_params:
      model: openrouter/xiaomi/mimo-v2.5
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: *mimo_v25

  - model_name: GLM-5.2-openrouter
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: os.environ/OPENROUTER_API_KEY
      # LiteLLM 1.92's bundled OpenRouter capability map predates this model's
      # current effort metadata. OpenRouter's live model catalog explicitly
      # advertises reasoning_effort, so preserve it instead of letting the
      # global drop_params policy erase it.
      allowed_openai_params: [reasoning_effort]
    model_info: *glm52

  # OAuth-backed cloud routes. Authentication is owned by the LiteLLM provider;
  # do not add api_key here or inject OPENAI_API_KEY/XAI_API_KEY at launch.
  - model_name: GPT-5.6-Sol-chatgpt-oauth
    litellm_params:
      model: chatgpt/gpt-5.6-sol
    model_info: *gpt56_sol_chatgpt_oauth

  - model_name: Grok-4.5-xai-oauth
    litellm_params:
      model: xai/grok-4.5
      use_xai_oauth: true
    model_info: *grok45_xai_oauth

  # Claude haiku-tier local model: first-class registry entry (not a discovered
  # route) so the tier survives reinstall/discovery and is anchor-checked.
  - model_name: Qwen3.6-27B-omlx
    litellm_params:
      model: openai/Qwen3.6-27B-4bit
      api_base: http://127.0.0.1:8000/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
    model_info: *qwen36_27b_local

  # Qwen3.6 35B-A3B MoE local route — Phase 0 replication arm (dense-vs-MoE under
  # identical harness guidance). Same caps as the 27B route, hence the shared anchor.
  # Name = the canonical discovered name (full model id, incl. A3B MoE marker +
  # quant), so this promoted entry and the sync-discovered route are one and the
  # same (dedup keeps only this one). Both packaged Qwen3.6 routes are qualified
  # thinking-OFF: with thinking enabled the forced-tool probe returned reasoning
  # text instead of a native tool call. extra_body.chat_template_kwargs is
  # forwarded by LiteLLM to oMLX as top-level chat_template_kwargs.
  - model_name: Qwen3.6-35B-A3B-4bit-omlx
    litellm_params:
      model: openai/Qwen3.6-35B-A3B-4bit
      api_base: http://127.0.0.1:8000/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
    model_info: *qwen36_27b_local

# BEGIN claude-litellm discovered local routes
# Managed by `claude-litellm sync`; generated from runtimes.omlx /v1/models.
# END claude-litellm discovered local routes

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

x-gateway-output-clamp:
  # C4: provider-facing hard clamp for raw clients and future harnesses.
  # Keep numerically aligned with harness adapterConfig.outputReservation
  # defaults so the gateway clamp never fights a well-derived harness request.
  # The hook uses route model_info.max_output_tokens as capability and this
  # policy as the reservation ceiling, preserving at least minimum_input tokens.
  enabled: true
  default: 32000
  tokenizer_headroom: 8192
  minimum_input: 32768

x-gateway-cost-guardrail:
  # F2: provider-facing per-request guardrail. This is not billing-grade spend
  # accounting; it rejects very large prompts before provider dispatch so live
  # probes cannot accidentally spend dollars without an explicit opt-out.
  enabled: true
  max_estimated_input_tokens: 200000
  max_estimated_total_tokens: 240000
  chars_per_token: 4

litellm_settings:
  # drop_params: harnesses over-advertise dialect params (thinking/betas/effort);
  # dropping beats provider 400s across N harnesses x M backends. Cost: silent
  # drops -- observe via `claude-litellm reasoning matrix` drop_risk column; per-model
  # correction is provider/model-specific routing, not a Claude capability env.
  drop_params: true
  callbacks: [ai_litellm_callbacks.output_clamp.proxy_handler_instance]
  # 1.9x routes Anthropic /v1/messages + tools to the Responses API by default;
  # our chat-completions backends (OpenRouter/vLLM) do not serve /v1/responses.
  # Force the chat-completions path. No-op on <=1.81.14 (the flag did not exist).
  use_chat_completions_url_for_anthropic_messages: true

router_settings:
  # Enforce max_input_tokens at the gateway: oversized prompts are rejected
  # (ContextWindowExceededError), never silently truncated. This is the backstop
  # that holds regardless of what each harness believes the context window is.
  enable_pre_call_checks: true
