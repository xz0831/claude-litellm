name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install jq and ripgrep
        run: brew install jq ripgrep

      - name: Run repository checks
        run: ./scripts/check.zsh

      - name: Run repository checks under a C/POSIX locale (encoding regression guard)
        # Bare/non-interactive contexts (launchd, cron, minimal SSH/Docker) run
        # with an unset or C locale, which makes Ruby default to US-ASCII. The
        # UTF-8 em-dashes in litellm_config.yaml comments must not crash the
        # inline-Ruby readers there; this re-run proves the fabric is locale-safe.
        run: LC_ALL=C LANG=C ./scripts/check.zsh

  token-clamp:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LiteLLM
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'litellm[proxy]==1.81.14'

      - name: Verify LiteLLM token clamp behavior
        run: |
          ./scripts/verify_litellm_token_clamp.py --json > clamp.json
          python - <<'PY'
          import json
          payload = json.load(open("clamp.json"))
          assert payload["plain_config_enforced_client_output_cap"] is False
          assert payload["modify_params_enforced_client_output_cap"] is False
          assert payload["hook_enforced_client_output_cap"] is True
          assert payload["hook_enforced_cost_guardrail"] is True
          assert payload["hook_enforced_cost_guardrail_tools"] is True
          assert payload["recommended_policy"] == "async_pre_call_deployment_hook"
          PY
          PYTHONPATH="$PWD/config" ./scripts/verify_litellm_token_clamp.py \
            --callback-module ai_litellm_callbacks.output_clamp.proxy_handler_instance \
            --json > clamp-production.json
          python - <<'PY'
          import json
          payload = json.load(open("clamp-production.json"))
          assert payload["callback_module"] == "ai_litellm_callbacks.output_clamp.proxy_handler_instance"
          assert payload["hook_enforced_client_output_cap"] is True
          assert payload["hook_enforced_cost_guardrail"] is True
          assert payload["hook_enforced_cost_guardrail_tools"] is True
          assert payload["recommended_policy"] == "async_pre_call_deployment_hook"
          PY

  tool-fidelity:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LiteLLM
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'litellm[proxy]==1.81.14'

      - name: Verify tool-call translation fidelity
        run: |
          ./scripts/verify_tool_call_fidelity.py --json > fidelity.json
          cat fidelity.json
          python - <<'PY'
          import json
          p = json.load(open("fidelity.json"))["mock"]
          # Anthropic <-> OpenAI tool translation must survive the round trip:
          assert p["single_turn_tool_use_roundtrip"] is True
          assert p["request_tools_translated"] is True
          assert p["multiturn_tool_result_roundtrip"] is True
          assert p["multiturn_history_translated"] is True
          assert p["thinking_plus_tooluse_resume_ok"] is True
          PY

  dash-tests:
    # The `fabric` dashboard tests (Textual/Pilot) need textual + pytest, which
    # the structural `check` job does NOT provision — there they SKIP, so a dash
    # regression could pass CI silently. This job installs the deps and runs them
    # directly, making the dashboard a real CI gate.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Textual + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install textual pytest pytest-asyncio

      - name: Run fabric dashboard tests
        run: |
          cd config/ai-litellm
          python -m pytest fabric_dash/tests/ -q
