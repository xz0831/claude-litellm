name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq and ripgrep
        run: brew install jq ripgrep

      - name: Run repository checks
        run: ./scripts/check.zsh

  token-clamp:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LiteLLM
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'litellm[proxy]==1.81.14'

      - name: Verify LiteLLM token clamp behavior
        run: |
          ./scripts/verify_litellm_token_clamp.py --json > clamp.json
          python - <<'PY'
          import json
          payload = json.load(open("clamp.json"))
          assert payload["plain_config_enforced_client_output_cap"] is False
          assert payload["modify_params_enforced_client_output_cap"] is False
          assert payload["hook_enforced_client_output_cap"] is True
          assert payload["recommended_policy"] == "async_pre_call_deployment_hook"
          PY
          PYTHONPATH="$PWD/config" ./scripts/verify_litellm_token_clamp.py \
            --callback-module ai_litellm_callbacks.output_clamp.proxy_handler_instance \
            --json > clamp-production.json
          python - <<'PY'
          import json
          payload = json.load(open("clamp-production.json"))
          assert payload["callback_module"] == "ai_litellm_callbacks.output_clamp.proxy_handler_instance"
          assert payload["hook_enforced_client_output_cap"] is True
          assert payload["recommended_policy"] == "async_pre_call_deployment_hook"
          PY
